services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PGUSER:-eprx}
      POSTGRES_PASSWORD: ${PGPASSWORD:-eprx_password}
      POSTGRES_DB: ${PGDATABASE:-eprescription}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-eprx}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${PGUSER:-eprx}:${PGPASSWORD:-eprx_password}@db:5432/${PGDATABASE:-eprescription}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_minimum_32_chars_long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_minimum_32_chars}
      EMAIL_TOKEN_SECRET: ${EMAIL_TOKEN_SECRET:-change_me_email_token_secret_minimum_32_chars}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-stream}
      EMAIL_FROM: ${EMAIL_FROM:-ePrescribe <no-reply@eprescribe.local>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:8080}
      PHARMACY_NETWORK: ${PHARMACY_NETWORK:-internal}
    ports:
      - "4000:4000"
    # Run migrations + seed on first boot, then start the API
    command: sh -c "node src/db/migrate.js && node src/db/seed.js || true; node src/server.js"

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
